<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DRAFT | Pelaajat</title>
        <link rel="stylesheet" href="/css/base.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link id="dynamic-favicon" rel="icon" href="/logos/favicon_white.svg" type="image/svg+xml">
        <script>
            const favicon = document.getElementById('dynamic-favicon');

            function updateFavicon() {
                // Check if the browser/system is in dark mode
                const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

                if (isDarkMode) {
                    // Use the white version for dark backgrounds
                    favicon.href = '/logos/favicon_white.svg';
                } else {
                    // Use the standard version for light backgrounds
                    favicon.href = '/logos/favicon.svg';
                }
            }

            // Run immediately on page load
            updateFavicon();

            // Watch for changes (e.g., if the user toggles their system theme)
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <script src="https://unpkg.com/htmx.org@1.9.0" defer></script>
        <script src="/js/hamburger.js" defer></script>
        <script src="/js/filters.js" defer></script>
    </head>
    <body>
        <header>
            <div class="titlebar">
                <a href="/index.html" class="logo-link">
                    <svg width="50px" height="50px">
                        <use href="/logos/logo_white_black.svg#logo_white_black"></use>
                    </svg>
                    <!-- <img src="/logos/logo_default.png" width="100px" height="auto"> -->
                </a>
                <div class="title">
                    <a href="/index.html">
                        <spans>DRAFT</spans>
                    </a>
                </div>
                <a class="hamburger" role="button">
                    <img id="hamburger-icon" src="/icons/hamburger.png">
                </a>
            </div>
            <nav class="menu">
                <ul>
                    <li class="child-page"><a href="/schedule.html"><span>OTTELUOHJELMA</span></a></li>
                    <li class="child-page"><a href="/stats.html"><span>TILASTOT</span></a></li>
                    <li class="child-page"><a href="/players.html"><span>PELAAJAT</span></a></li>
                    <li class="child-page"><a href="/tournamentinfo.html"><span>INFO</span></a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="content">
                <div class="child-page-title">
                    <h1>Pelaajat</h1>
                </div>
                <div class="filter-controls">
                    <button id="main-filter-btn">Suodattimet ▼</button>
                    <div id="main-filter-panel">
                        <div class="filter-group" id="filter-position1">
                            <h4>P1</h4>
                            <label><input type="checkbox" value="H"> H</label>
                            <label><input type="checkbox" value="K"> K</label>
                            <label><input type="checkbox" value="P"> P</label>
                            <label><input type="checkbox" value="MV"> MV</label>
                        </div>
                        <div class="filter-group" id="filter-position2">
                            <h4>P2</h4>
                            <label><input type="checkbox" value="H"> H</label>
                            <label><input type="checkbox" value="K"> K</label>
                            <label><input type="checkbox" value="P"> P</label>
                        </div>
                        <div class="filter-group" id="filter-stick">
                            <h4>Maila</h4>
                            <label><input type="checkbox" value="L"> L</label>
                            <label><input type="checkbox" value="R"> R</label>
                        </div>
                        <div class="filter-group" id="filter-licenced">
                            <h4>Lisenssi</h4>
                            <label><input type="checkbox" value="X"> X</label>
                            <label><input type="checkbox" value="✓"> ✓</label>
                        </div>
                        <div class="filter-group" id="filter-recruiter">
                            <h4>Kutsunut</h4>
                            <label><input type="checkbox" value="Roni Haarala"> Roni Haarala</label>
                            <label><input type="checkbox" value="Roope Lahti"> Roope Lahti</label>
                            <label><input type="checkbox" value="Titus Metsälä"> Titus Metsälä</label>
                            <label><input type="checkbox" value="Mirko Keränen"> Mirko Keränen</label>
                            <label><input type="checkbox" value="Mitri Keränen"> Mitri Keränen</label>
                            <label><input type="checkbox" value="Julius Metsälä"> Julius Metsälä</label>
                            <label><input type="checkbox" value="Toimitsijat"> Toimitsijat</label>
                        </div>
                        
                        <div class="filter-actions" style="width: 100%; display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                            <button id="clear-filters-btn" type="button">Tyhjennä</button>
                            <button id="apply-filters-btn" type="button">Käytä</button>
                        </div>
                    </div>
                    
                </div>
                <div id="player-table-wrapper">
                    <form id="filter-form" hx-get="/players" hx-trigger="filterChanged from:body" hx-target="#player-tbody">
                        <input type="hidden" name="shirt_number" value="">
                        <input type="hidden" name="team_id" value="">
                        <input type="hidden" name="position1" value="">
                        <input type="hidden" name="position2" value="">
                        <input type="hidden" name="stick" value="">
                        <input type="hidden" name="playstyle" value="">
                        <input type="hidden" name="licenced" value="">
                        <input type="hidden" name="recruiter" value="">
                        <input type="hidden" name="sort_by" id="sort-by-input" value="team_id">
                        <input type="hidden" name="sort_order" id="sort-input" value="asc">
                    </form>
                    
                    <table class="player-table">
                        <colgroup>
                            <col style="width: 245px">
                            <col style="width: 64px">
                            <col style="width: 64px">
                            <col style="width: 64px">
                            <col style="width: 64px">
                            <col style="width: 74px">
                            <col style="width: 64px">
                            <col style="width: 108px">
                            <col style="width: 220px">
                            <col style="width: 88px">
                            <col style="width: 110px">
                        </colgroup>
                        <thead>
                            <tr class="thead-tr">
                                <!-- 'name' is active by default. Span is placed BEFORE text for "Above" look -->
                                <th class="players-th sortable-th left-column" id="sort-name">
                                    <span class="sort-indicator"></span>
                                    Pelaaja
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-shirt_number">
                                    <span class="sort-indicator"></span>
                                    #
                                </th>
                                
                                <th class="players-th sortable-th active-sort-cell" id="sort-team_id">
                                    <span class="sort-indicator"></span>
                                    J
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-primary_pos">
                                    <span class="sort-indicator"></span>
                                    P1
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-secondary_pos">
                                    <span class="sort-indicator"></span>
                                    P2
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-stick">
                                    <span class="sort-indicator"></span>
                                    Maila
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-age">
                                    <span class="sort-indicator"></span>
                                    Ikä
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-experience">
                                    <span class="sort-indicator"></span>
                                    Pelivuodet
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-playstyle">
                                    <span class="sort-indicator"></span>
                                    Pelaaja profiili
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-licenced">
                                    <span class="sort-indicator"></span>
                                    Lisenssi
                                </th>
                                
                                <th class="players-th sortable-th" id="sort-recruiter">
                                    <span class="sort-indicator"></span>
                                    Kutsunut
                                </th>
                            </tr>
                        </thead>
                        <tbody 
                            id="player-tbody"
                            hx-get="/players" 
                            hx-trigger="load, filterChanged from:body"
                            hx-include="#filter-form">
                            <!-- Rows generated by main_10.py -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

                    <span class="brand-name">DRAFT-TURNAUS <sup>©</sup></span>
                    <span class="location-tag">TKU 2026</span>
                </div>
            </div>
        </footer>
        <div class="menu-overlay" id="menu-overlay"></div>
    </body>
</html>
