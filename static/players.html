<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Draft Turnaus</title>
        <link rel="stylesheet" href="/css/base.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link rel="icon" href="/photos/logo.jpg" type="favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://unpkg.com/htmx.org@1.9.0" defer></script>
        <script src="/js/hamburger.js" defer></script>
        <script src="/js/filters.js" defer></script> 
    </head>
    <body>
        <header>
            <div class="titlebar">
                <a href="/index.html">
                    <img class="logo-header" src="/photos/logo.jpg">
                </a>
                <div class="title">
                    <a href="/index.html">
                        <spans>Draft Turnaus</spans>
                    </a>
                </div>
                <a class="hamburger">☰</a>
            </div>
            <nav class="menu">
                <ul>
                    <li class="child-page">
                        <a href="/schedule.html">
                            <span>Otteluohjelma</span>
                        </a>
                    </li>
                    <li class="child-page">
                        <a href="/stats.html">
                            <span>Tilastot</span>
                        </a>
                    </li>
                    <li class="child-page">
                        <a href="/leaderboard.html">
                            <span>Sarjataulukko</span>
                        </a>
                    </li>
                    <li class="child-page">
                        <a href="/players.html">
                            <span>Pelaajat</span>
                        </a>
                    </li>
                    <li class="child-page">
                        <a href="/tournamentinfo.html">
                            <span>Turnaus info</span>
                        </a>
                    </li>
                </ul>
                <div class="trademark">
                    <span>Made by brothagenie TM</span>
                </div>
            </nav>
        </header>
        <main>
            <div class="content">
                <div id="player-table-wrapper">
                    <form id="filter-form">
                        <input type="hidden" name="position1" value="">
                        <input type="hidden" name="position2" value="">
                        <input type="hidden" name="stick" value="">
                        <input type="hidden" name="playstyle" value="">
                        <input type="hidden" name="license" value="">
                        <input type="hidden" name="invited_by" value="">
                        <input type="hidden" id="sort-input" name="sort" value="asc"> <!-- add this -->
                    </form>
                    <table class="player-table">
                        <colgroup>
                            <col class="photos-column" style="width: 220px">
                            <col style="width: 62px">
                            <col style="width: 62px">
                            <col style="width: 62px">
                            <col style="width: 80px">
                            <col style="width: 50px">
                            <col style="width: 80px">
                            <col style="width: 220px">
                            <col style="width: 80px">
                            <col style="width: 100px">
                        </colgroup>
                        <thead>
                            <tr class="thead-tr">
                                <!-- PELAAJA -->
                                <th class="players-th sortable-th" id="sort-name">
                                    Pelaaja <span class="sort-indicator">▼</span>
                                </th>
                                <th>#</th>

                                <!-- PELIPAIKKA 1 -->
                                <th class="filterable-th">
                                    <div class="th-content">
                                        <button class="filter-btn" data-filter="position1">
                                            <span>P1</span>
                                            <span class="filter-indicator">▼</span>
                                        </button>
                                    </div>
                                    <div class="filter-dropdown" id="filter-position1">
                                        <label><input type="checkbox" value="H"> H</label>
                                        <label><input type="checkbox" value="K"> K</label>
                                        <label><input type="checkbox" value="P"> P</label>
                                        <label><input type="checkbox" value="MV"> MV</label>
                                    </div>
                                </th>

                                <!-- PELIPAIKKA 2 -->
                                <th class="filterable-th">
                                    <div class="th-content">
                                        <button class="filter-btn" data-filter="position2">
                                            <span>P2</span>
                                            <span class="filter-indicator">▼</span>
                                        </button>
                                    </div>
                                    <div class="filter-dropdown" id="filter-position2">
                                        <label><input type="checkbox" value="H"> H</label>
                                        <label><input type="checkbox" value="K"> K</label>
                                        <label><input type="checkbox" value="P"> P</label>
                                        <label><input type="checkbox" value="MV"> MV</label>
                                    </div>
                                </th>

                                <!-- MAILA -->
                                <th class="filterable-th">
                                    <div class="th-content">
                                        <button class="filter-btn" data-filter="stick">
                                            <span>Maila</span>
                                            <span class="filter-indicator">▼</span>
                                        </button>
                                    </div>
                                    <div class="filter-dropdown" id="filter-stick">
                                        <label><input type="checkbox" value="L"> L</label>
                                        <label><input type="checkbox" value="R"> R</label>
                                    </div>
                                </th>

                                <!-- IKÄ -->
                                <th>IKÄ</th>

                                <!-- PELIVUODET -->
                                <th>PELIVUODET</th>
                                <!-- <th>pelaaja rofiili</th> -->
                                <!-- <th>lisenssi</th> -->
                                <!-- <th>kutsunut</th> -->

                                <!-- PELAAJA PROFIILI -->
                                <th class="filterable-th">
                                    <div class="th-content">
                                        <button class="filter-btn" data-filter="playstyle">
                                            <span>Pelaaja profiili</span>
                                            <span class="filter-indicator">▼</span>
                                        </button>
                                    </div>
                                    <div class="filter-dropdown" id="filter-playstyle">
                                        <label><input type="checkbox" value="Tarkka-ampuja">Tarkka-ampuja</label>
                                        <label><input type="checkbox" value="Pelinrakentaja">Pelinrakentaja</label>
                                        <label><input type="checkbox" value="Taitopelaaja">Taitopelaaja</label>
                                        <label><input type="checkbox" value="Graindaaja">Graindaaja</label>
                                        <label><input type="checkbox" value="Maalineduspelaaja">Maalineduspelaaja</label>
                                        <label><input type="checkbox" value="Kahden suunnan hyökkääjä">Kahden suunnan hyökkääjä</label>
                                        <label><input type="checkbox" value="Puolustava hyökkääjä">Puolustava hyökkääjä</label>
                                        <label><input type="checkbox" value="Hyökkäävä puolustaja">Hyökkäävä puolustaja</label>
                                        <label><input type="checkbox" value="Puolustava puolustaja">Puolustava puolustaja</label>
                                    </div>
                                </th>

                                <!-- LISENSSI -->
                                <th class="filterable-th">
                                    <div class="th-content">
                                        <button class="filter-btn" data-filter="license">
                                            <span>Lisenssi</span>
                                            <span class="filter-indicator">▼</span>
                                        </button>
                                    </div>
                                    <div class="filter-dropdown" id="filter-license">
                                        <label><input type="checkbox" value="X"> X</label>
                                        <label><input type="checkbox" value="Yes"> Yes</label>
                                    </div>
                                </th>

                                <!-- KUTSUNUT -->
                                <th class="filterable-th">
                                    <div class="th-content">
                                        <button class="filter-btn" data-filter="invited_by">
                                            <span>Kutsunut</span>
                                            <span class="filter-indicator">▼</span>
                                        </button>
                                    </div>
                                    <div class="filter-dropdown" id="filter-invited_by">
                                        <label><input type="checkbox" value="Matias Santapakka"> Matias Santapakka</label>
                                        <label><input type="checkbox" value="Roope Lahti"> Roope Lahti</label>
                                    </div>
                                </th>
                            </tr>
                        </thead>
                        <tbody 
                            id="player-tbody"
                            hx-get="/players" 
                            hx-trigger="load, filterChanged from:body"
                            hx-swap="innerHTML"
                            hx-include="#filter-form">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        <footer>
            <div class="footer">
                <div class="footerlinks-container">
                    <div class="footerlinks">
                        <span>Meistä</span>
                        <span>|</span>
                        <span>Säännöt</span>
                        <span>|</span>
                        <span>Muuta</span>
                        <span>|</span>
                        <span>Tietosuoja</span>
                    </div>
                </div>
                <div class="footertitle">
                    <span>© Draft turnaus<sup>&trade;</sup></span>
                    <span>Turku 2026</span>
                </div>
            </div>
        </footer>
    </body>
</html>
