        </header>
        <main>
            <div class="content">
                <div class="child-page-title">
                    <h1>Pelaajat</h1>
                </div>
                <div id="player-table-wrapper">
                    <div class="filter-controls">
                        <button id="main-filter-btn">Suodattimet ▼</button>
                        <div id="main-filter-panel">
                            <div class="filter-group" id="filter-position1">
                                <h4>P1</h4>
                                <label><input type="checkbox" value="H"> H</label>
                                <label><input type="checkbox" value="K"> K</label>
                                <label><input type="checkbox" value="P"> P</label>
                                <label><input type="checkbox" value="MV"> MV</label>
                            </div>
                            <div class="filter-group" id="filter-position2">
                                <h4>P2</h4>
                                <label><input type="checkbox" value="H"> H</label>
                                <label><input type="checkbox" value="K"> K</label>
                                <label><input type="checkbox" value="P"> P</label>
                                <!-- <label><input type="checkbox" value="MV"> MV</label> -->
                            </div>
                            <div class="filter-group" id="filter-stick">
                                <h4>Maila</h4>
                                <label><input type="checkbox" value="L"> L</label>
                                <label><input type="checkbox" value="R"> R</label>
                            </div>
                            <!-- <div class="filter-group" id="filter-playstyle">
                                <h4>Pelaaja profiili</h4>
                                <label><input type="checkbox" value="Tarkka-ampuja">Tarkka-ampuja</label>
                                <label><input type="checkbox" value="Pelinrakentaja">Pelinrakentaja</label>
                                <label><input type="checkbox" value="Taitopelaaja">Taitopelaaja</label>
                                <label><input type="checkbox" value="Graindaaja">Graindaaja</label>
                                <label><input type="checkbox" value="Maalineduspelaaja">Maalineduspelaaja</label>
                                <label><input type="checkbox" value="Kahden suunnan hyökkääjä">Kahden suunnan hyökkääjä</label>
                                <label><input type="checkbox" value="Puolustava hyökkääjä">Puolustava hyökkääjä</label>
                                <label><input type="checkbox" value="Hyökkäävä puolustaja">Hyökkäävä puolustaja</label>
                                <label><input type="checkbox" value="Puolustava puolustaja">Puolustava puolustaja</label>
                            </div> -->
                            <div class="filter-group" id="filter-licenced">
                                <h4>Lisenssi</h4>
                                <label><input type="checkbox" value="X"> X</label>
                                <label><input type="checkbox" value="✓"> ✓</label>
                            </div>
                            <div class="filter-group" id="filter-recruiter">
                                <h4>Kutsunut</h4>
                                <label><input type="checkbox" value="Roni Haarala"> Roni Haarala</label>
                                <label><input type="checkbox" value="Roope Lahti"> Roope Lahti</label>
                                <label><input type="checkbox" value="Titus Metsälä"> Titus Metsälä</label>
                                <label><input type="checkbox" value="Mirko Keränen"> Mirko Keränen</label>
                                <label><input type="checkbox" value="Mitri Keränen"> Mitri Keränen</label>
                                <label><input type="checkbox" value="Julius Metsälä"> Julius Metsälä</label>
                                <label><input type="checkbox" value="Toimitsijat"> Toimitsijat</label>
                            </div>
                            
                            <div class="filter-actions" style="width: 100%; display: flex; justify-content: space-between; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                                <button id="clear-filters-btn" type="button" style="padding: 6px 12px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Poista kaikki</button>
                                <button id="apply-filters-btn" type="button" style="padding: 6px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">Käytä</button>
                            </div>
                        </div>
                        
                    </div>

                    <form id="filter-form" hx-get="/players" hx-trigger="filterChanged from:body" hx-target="#player-tbody">
                        <input type="hidden" name="position1" value="">
                        <input type="hidden" name="position2" value="">
                        <input type="hidden" name="stick" value="">
                        <input type="hidden" name="playstyle" value="">
                        <input type="hidden" name="licenced" value="">
                        <input type="hidden" name="recruiter" value="">
                        <input type="hidden" name="sort_by" id="sort-by-input" value="name">
                        <input type="hidden" name="sort_order" id="sort-input" value="asc">
                    </form>
                    
                    <table class="player-table">
                        <colgroup>
                            <col class="photos-column" style="width: 220px">
                            <!-- <col style="width: 62px"> -->
                            <col style="width: 62px">
                            <col style="width: 62px">
                            <col style="width: 80px">
                            <col style="width: 62px">
                            <col style="width: 120px">
                            <col style="width: 220px">
                            <col style="width: 100px">
                            <col style="width: 100px">
                        </colgroup>
                        <thead>
                            <tr class="thead-tr">
                                <th class="players-th sortable-th" id="sort-name">Pelaaja <span class="sort-indicator">⇅</span></th>
                                <!-- <th class="players-th sortable-th" id="sort-shirt_number"># <span class="sort-indicator">⇅</span></th> -->
                                <th class="players-th sortable-th" id="sort-primary_pos">P1 <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-secondary_pos">P2 <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-stick">Maila <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-age">Ikä <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-experience">Pelivuodet <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-playstyle">Pelaaja profiili <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-licenced">Lisenssi <span class="sort-indicator">⇅</span></th>
                                <th class="players-th sortable-th" id="sort-recruiter">Kutsunut <span class="sort-indicator">⇅</span></th>
                            </tr>
                        </thead>
                        <tbody 
                            id="player-tbody"
                            hx-get="/players" 
                            hx-trigger="load, filterChanged from:body"
                            hx-swap="innerHTML"
                            hx-include="#filter-form">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
        <footer>
            <div class="footer">
                <div class="footerlinks-container">
                    <!-- <div class="footerlinks">
                        <span>Meistä</span><span>|</span><span>Säännöt</span><span>|</span><span>Muuta</span><span>|</span><span>Tietosuoja</span>
                    </div> -->
                </div>
                <div class="footertitle">
                    <span>© Draft turnaus<sup>&trade;</sup></span>
                    <span>Turku 2026</span>
                </div>
            </div>
