<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DRAFT | Otteluohjelma</title>
        <link rel="stylesheet" href="/css/base.css">
        <link rel="stylesheet" href="/css/tables.css">
        <link id="dynamic-favicon" rel="icon" href="/logos/favicon_white.svg" type="image/svg+xml">
        <script>
            const favicon = document.getElementById('dynamic-favicon');

            function updateFavicon() {
                // Check if the browser/system is in dark mode
                const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

                if (isDarkMode) {
                    // Use the white version for dark backgrounds
                    favicon.href = '/logos/favicon_white.svg';
                } else {
                    // Use the standard version for light backgrounds
                    favicon.href = '/logos/favicon.svg';
                }
            }

            // Run immediately on page load
            updateFavicon();

            // Watch for changes (e.g., if the user toggles their system theme)
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateFavicon);
        </script>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <script src="https://unpkg.com/htmx.org@1.9.0" defer></script>
        <script src="/js/hamburger.js" defer></script>
        <script src="/js/schedule.js" defer></script>
    </head>
    <body>
        <header>
            <div class="titlebar">
                <a href="/index.html" class="logo-link">
                    <svg width="50px" height="50px">
                        <use href="/logos/logo_white_black.svg#logo_white_black"></use>
                    </svg>
                    <!-- <img src="/logos/logo_default.png" width="100px" height="auto"> -->
                </a>
                <div class="title">
                    <a href="/index.html">
                        <spans>DRAFT</spans>
                    </a>
                </div>
                <a class="hamburger" role="button">
                    <img id="hamburger-icon" src="/icons/hamburger.png">
                </a>
            </div>
            <nav class="menu">
                <ul>
                    <li class="child-page"><a href="/schedule.html"><span>OTTELUOHJELMA</span></a></li>
                    <li class="child-page"><a href="/stats.html"><span>TILASTOT</span></a></li>
                    <li class="child-page"><a href="/players.html"><span>PELAAJAT</span></a></li>
                    <li class="child-page"><a href="/tournamentinfo.html"><span>INFO</span></a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="content">
                <div class="child-page-title">
                    <h1>Otteluohjelma</h1>
                </div>
                <div class="leaderboard-filter-wrapper">
                    <div class="leaderboard-filter">
                        <button class="leaderboard-division active" onclick="showSchedule('lohkot')">Lohkot</button>
                        <button class="leaderboard-league" onclick="showSchedule('jatko')">Jatko-ottelut</button>
                    </div>
                </div>
                <div id="section-lohkot">
                    <div class="division-table-wrapper">
                        <div class="division-title">
                            <h2>Lohko A</h2>
                        </div>
                    
                        <div class="table-container">
                            <table class="division-a-table">
                                <thead class="schedule-header">
                                    <tr>
                                        <th>Ottelu</th>
                                    </tr>
                                </thead>
                                <tbody hx-get="/schedule/division-a" hx-trigger="load" hx-swap="innerHTML">
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="division-table-wrapper">
                        <div class="division-title">
                            <h2>Lohko B</h2>
                        </div>
                        <div class="table-container">
                            <table class="schedule-table">
                                <thead class="schedule-header">
                                    <tr>
                                        <th>Ottelu</th>
                                    </tr>
                                </thead>
                                <tbody hx-get="/schedule/division-b" hx-trigger="load" hx-swap="innerHTML">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="jatko-tables-wrapper">
                    <div id="section-jatko" style="display: none;">
                        <div class="division-title">
                            <span>Jatko-ottelut</span>
                        </div>
                        <div class="table-container">
                            <table class="division-playoffs-table">
                                <thead class="schedule-header">
                                    <tr>
                                        <th>Ottelu</th>
                                    </tr>
                                </thead>
                                <tbody hx-get="/schedule/playoffs" hx-trigger="load" hx-swap="innerHTML">
                                </tbody>
                            </table>
                        </div>
                    </div> 
                </div>
            </div>
        </main>
        <footer>
            <div class="footer">
                <!-- Primary Navigation Links -->
                <nav class="footer-links">
                    <a href="/credits.html">Tekijät</a>
                    <a href="/rules.html">Säännöt</a>
                    <a href="/gdpr.html">Tietosuoja</a>
                </nav>
                
                <!-- Branding and Copyright -->
                <div class="footer-title">
                    <span class="brand-name">DRAFT-TURNAUS <sup>©</sup></span>
                    <span class="location-tag">TKU 2026</span>
                </div>
            </div>
        </footer>
        <div class="menu-overlay" id="menu-overlay"></div>
    </body>
</html>
